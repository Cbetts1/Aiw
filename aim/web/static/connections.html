<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections — AIM Artificial Intelligence Mesh</title>
  <meta name="description" content="Manage remote AIM node connections. Every connection is stored in the virtual cloud for full lifecycle management." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060a0f;
      --surface:  #0d1117;
      --surface2: #161b22;
      --border:   #21262d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --gold:     #e3b341;
      --purple:   #a371f7;
      --danger:   #f85149;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   10px;
      --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
      --max-w:    860px;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,10,15,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 54px;
    }
    .nav-logo { font-size: 1.15rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-decoration: none; }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .page { max-width: var(--max-w); margin: 0 auto; padding: 40px 20px 80px; }

    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 { font-size: 2rem; font-weight: 700; color: var(--text); }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); margin-top: 8px; font-size: .95rem; }

    /* ── Stats ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-val  { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: .82rem; color: var(--muted); margin-top: 2px; }

    /* ── Add form ── */
    .add-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px 28px; margin-bottom: 28px;
    }
    .add-card h2 { font-size: 1rem; color: var(--text); margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 120px auto; gap: 12px; align-items: end; }
    .field label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: 5px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: .88rem;
      outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); color: #fff; border: none; padding: 9px 22px;
      border-radius: 8px; font-size: .9rem; cursor: pointer; font-weight: 600;
      transition: background .2s; white-space: nowrap;
    }
    .btn-primary:hover { background: #3b8fe0; }
    .form-error { color: var(--danger); font-size: .82rem; margin-top: 8px; display: none; }
    .form-success { color: var(--accent2); font-size: .82rem; margin-top: 8px; display: none; }

    /* ── Connection cards ── */
    .section-title {
      font-size: .82rem; color: var(--muted); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .conn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .conn-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px; position: relative; transition: border-color .2s;
    }
    .conn-card:hover { border-color: var(--accent); }
    .conn-card-name { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .conn-card-addr { font-size: .8rem; color: var(--accent); font-family: monospace; margin-bottom: 10px; }
    .conn-card-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .badge {
      font-size: .7rem; padding: 2px 9px; border-radius: 20px;
      background: rgba(88,166,255,.12); color: var(--accent);
      border: 1px solid rgba(88,166,255,.3);
    }
    .badge.green { background: rgba(63,185,80,.12); color: var(--accent2); border-color: rgba(63,185,80,.3); }
    .badge.purple { background: rgba(163,113,247,.12); color: var(--purple); border-color: rgba(163,113,247,.3); }
    .conn-card-meta { font-size: .75rem; color: var(--muted); margin-bottom: 12px; }
    .conn-card-actions { display: flex; gap: 8px; }
    .btn-ai { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: .8rem; transition: all .2s; }
    .btn-ai:hover { background: var(--accent); color: #fff; }
    .btn-remove { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: .8rem; transition: all .2s; }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state p { margin-bottom: 16px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 10px;
      font-size: .88rem; z-index: 300;
      animation: slideIn .3s ease;
      display: none;
    }
    .toast.show { display: block; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">A·I·M</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/aim">AI</a></li>
    <li><a href="/connections" class="active">Connections</a></li>
    <li><a href="/apps">Apps</a></li>
    <li><a href="/directory">Directory</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Remote <span>Connections</span></h1>
    <p>Every remote AIM node you connect is stored in the virtual cloud for full lifecycle management.</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="totalConns">0</div>
      <div class="stat-label">Remote Nodes</div>
    </div>
    <div class="stat-card">
      <div class="stat-val dot-green" id="aiSessions" style="color:var(--accent2)">0</div>
      <div class="stat-label">AI Sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="aiVersion" style="color:var(--gold)">—</div>
      <div class="stat-label">AIM Version</div>
    </div>
  </div>

  <!-- Add Connection -->
  <div class="add-card">
    <h2>➕ Connect a Remote AIM Node</h2>
    <div class="form-row">
      <div class="field">
        <label>Name (optional)</label>
        <input id="fName" placeholder="My Home Node" />
      </div>
      <div class="field">
        <label>Host / IP address</label>
        <input id="fHost" placeholder="1.2.3.4 or myserver.com" />
      </div>
      <div class="field">
        <label>Port</label>
        <input id="fPort" type="number" placeholder="7700" value="7700" />
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button class="btn-primary" onclick="addConn()">Connect</button>
      </div>
    </div>
    <p class="form-error" id="fError"></p>
    <p class="form-success" id="fSuccess"></p>
  </div>

  <!-- Connections list -->
  <div class="section-title">
    <span>Connected Nodes (stored in vCloud)</span>
    <span id="connCount" style="color:var(--accent)">0 nodes</span>
  </div>
  <div id="connGrid" class="conn-grid"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  async function loadAll() {
    try {
      const [sr, cr] = await Promise.all([
        fetch('/api/ai/status'),
        fetch('/api/connections'),
      ]);
      const s = await sr.json();
      const c = await cr.json();
      document.getElementById('totalConns').textContent  = c.connections?.length ?? 0;
      document.getElementById('aiSessions').textContent  = s.sessions ?? 0;
      document.getElementById('aiVersion').textContent   = s.version  ?? '—';
      document.getElementById('connCount').textContent   = `${c.connections?.length ?? 0} nodes`;
      renderGrid(c.connections || []);
    } catch(e) { showToast('Error loading data: ' + e.message); }
  }

  function renderGrid(list) {
    const el = document.getElementById('connGrid');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <p>No remote nodes connected yet.</p>
        <p>Add your first remote node above. It will be stored in vCloud automatically.</p>
      </div>`;
      return;
    }
    el.innerHTML = list.map(c => {
      const caps = (c.metadata?.capabilities || []).map(cap =>
        `<span class="badge">${escHtml(cap)}</span>`).join('');
      const created = c.created_at ? new Date(c.created_at * 1000).toLocaleString() : '—';
      return `
      <div class="conn-card" id="cc-${c.resource_id}">
        <div class="conn-card-name">${escHtml(c.name || 'Unnamed Node')}</div>
        <div class="conn-card-addr">${escHtml(c.host)}:${c.port}</div>
        <div class="conn-card-badges">
          <span class="badge green">connected</span>
          <span class="badge purple">vcloud</span>
          ${caps}
        </div>
        <div class="conn-card-meta">Added: ${created}<br>ID: ${c.resource_id.slice(0,8)}…</div>
        <div class="conn-card-actions">
          <button class="btn-ai" onclick="goToAI('${c.resource_id}','${c.host}',${c.port},'${escHtml(c.name||'')}')">Chat via AI</button>
          <button class="btn-remove" onclick="removeConn('${c.resource_id}','${escHtml(c.name||c.host)}')">Disconnect</button>
        </div>
      </div>`;
    }).join('');
  }

  async function addConn() {
    const name = document.getElementById('fName').value.trim();
    const host = document.getElementById('fHost').value.trim();
    const port = parseInt(document.getElementById('fPort').value, 10);
    const errEl = document.getElementById('fError');
    const okEl  = document.getElementById('fSuccess');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    if (!host)      { errEl.textContent = 'Host is required.'; errEl.style.display = 'block'; return; }
    if (!port || port < 1) { errEl.textContent = 'Valid port is required.'; errEl.style.display = 'block'; return; }

    try {
      const r = await fetch('/api/connections', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, host, port }),
      });
      const d = await r.json();
      if (!r.ok) { errEl.textContent = d.error || 'Failed.'; errEl.style.display = 'block'; return; }
      document.getElementById('fName').value = '';
      document.getElementById('fHost').value = '';
      document.getElementById('fPort').value = '7700';
      okEl.textContent = `✅ Connected! Stored in vCloud as "${d.connection?.name || host}".`;
      okEl.style.display = 'block';
      await loadAll();
      showToast('Node connected and stored in vCloud.');
    } catch(e) {
      errEl.textContent = 'Error: ' + e.message;
      errEl.style.display = 'block';
    }
  }

  async function removeConn(id, label) {
    if (!confirm(`Disconnect "${label}"? This will remove it from vCloud.`)) return;
    try {
      const r = await fetch(`/api/connections?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (r.ok) { showToast('Node disconnected.'); await loadAll(); }
      else { const d = await r.json(); showToast('Error: ' + (d.error || 'unknown')); }
    } catch(e) { showToast('Error: ' + e.message); }
  }

  function goToAI(id, host, port, name) {
    const label = encodeURIComponent(name || host + ':' + port);
    window.location.href = `/aim#node=${id}&host=${encodeURIComponent(host)}&port=${port}&name=${label}`;
  }

    def showToast(msg, durationMs = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), durationMs);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
