<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIM — Artificial Intelligence Mesh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --danger:   #f85149;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   8px;
      --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
      max-width: 680px;
      width: 100%;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 14px;
    }

    /* Node settings row */
    .settings-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-row label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      flex: 1;
      min-width: 120px;
    }

    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    /* Status badge */
    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--border);
      color: var(--muted);
      margin-left: 10px;
      vertical-align: middle;
    }

    #status-badge.online  { background: #1a3a20; color: var(--accent2); }
    #status-badge.offline { background: #3a1a1a; color: var(--danger); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Query area */
    .query-row {
      display: flex;
      gap: 10px;
    }

    .query-row input {
      flex: 1;
    }

    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }

    button:hover { opacity: .85; }
    button:active { opacity: .7; }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }

    /* Results */
    #result-box {
      display: none;
    }

    #result-box .answer {
      font-size: 1.05rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #result-box .meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
    }

    #result-box.error .answer {
      color: var(--danger);
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* History */
    #history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #history-list li {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    #history-list li .q {
      font-size: 0.88rem;
      color: var(--accent);
      margin-bottom: 4px;
    }

    #history-list li .a {
      font-size: 0.88rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    #history-list li .ts {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 12px 0;
    }

    footer {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      margin-top: 24px;
    }

    @media (max-width: 480px) {
      .query-row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>⬡ AIM</h1>
  <p>Artificial Intelligence Mesh &mdash; open to every browser &amp; device</p>
</header>

<!-- Node connection -->
<div class="card">
  <h2>Node Connection
    <span id="status-badge"><span class="dot"></span><span id="status-text">unknown</span></span>
  </h2>
  <div class="settings-row">
    <label>
      Host
      <input type="text" id="node-host" value="127.0.0.1" placeholder="127.0.0.1" />
    </label>
    <label>
      Port
      <input type="number" id="node-port" value="7700" min="1" max="65535" />
    </label>
    <label style="justify-content:flex-end; flex:0;">
      &nbsp;
      <button class="btn-secondary" id="btn-ping" onclick="ping()">Ping</button>
    </label>
  </div>
</div>

<!-- Query -->
<div class="card">
  <h2>Query</h2>
  <div class="query-row">
    <input type="text" id="query-input" placeholder="Ask anything…" autocomplete="off"
           onkeydown="if(event.key==='Enter') sendQuery()" />
    <button id="btn-send" onclick="sendQuery()">Send</button>
  </div>
</div>

<!-- Result -->
<div class="card" id="result-box">
  <h2>Response</h2>
  <div class="spinner" id="spinner"></div>
  <div class="answer" id="result-answer"></div>
  <div class="meta" id="result-meta"></div>
</div>

<!-- History -->
<div class="card" id="history-card">
  <h2>History
    <button class="btn-secondary" style="font-size:.75rem;padding:3px 10px;margin-left:8px"
            onclick="clearHistory()">Clear</button>
  </h2>
  <ul id="history-list">
    <li><p class="empty-state">No queries yet.</p></li>
  </ul>
</div>

<footer>
  AIM Web Bridge &mdash; <span id="version"></span> &mdash; origin: <span id="origin"></span>
</footer>

<script>
  const $ = id => document.getElementById(id);

  // Fetch server info on load
  fetch('/api/info')
    .then(r => r.json())
    .then(d => {
      $('version').textContent = 'v' + (d.version || '?');
      $('origin').textContent = d.origin || '?';
    })
    .catch(() => {});

  function nodeParams() {
    return `host=${encodeURIComponent($('node-host').value)}&port=${encodeURIComponent($('node-port').value)}`;
  }

  async function ping() {
    const badge = $('status-badge');
    const txt   = $('status-text');
    badge.className = '';
    txt.textContent = 'checking…';
    try {
      const r = await fetch(`/api/status?${nodeParams()}`);
      const d = await r.json();
      if (d.online) {
        badge.className = 'online';
        txt.textContent = 'online';
      } else {
        badge.className = 'offline';
        txt.textContent = d.error || 'offline';
      }
    } catch(e) {
      badge.className = 'offline';
      txt.textContent = 'offline';
    }
  }

  let history = [];

  async function sendQuery() {
    const q = $('query-input').value.trim();
    if (!q) return;

    const box     = $('result-box');
    const answer  = $('result-answer');
    const meta    = $('result-meta');
    const spinner = $('spinner');
    const btn     = $('btn-send');

    box.style.display = 'block';
    box.className = 'card';
    answer.textContent = '';
    meta.textContent = '';
    spinner.style.display = 'block';
    btn.disabled = true;

    const t0 = Date.now();
    try {
      const r = await fetch(`/api/query?q=${encodeURIComponent(q)}&${nodeParams()}`);
      const d = await r.json();
      spinner.style.display = 'none';

      if (r.ok) {
        const res = d.result;
        let text = '';
        if (typeof res === 'string') {
          text = res;
        } else if (res && res.answer) {
          text = res.answer;
        } else {
          text = JSON.stringify(res, null, 2);
        }
        answer.textContent = text;
        meta.textContent = `node: ${d.node}  ·  ${Date.now() - t0}ms`;
        addHistory(q, text);
      } else {
        box.className = 'card error';
        answer.textContent = d.error || 'Unknown error';
      }
    } catch(e) {
      spinner.style.display = 'none';
      box.className = 'card error';
      answer.textContent = 'Network error — is the AIM Web Bridge running?';
    } finally {
      btn.disabled = false;
    }
  }

  function addHistory(q, a) {
    history.unshift({ q, a, ts: new Date().toLocaleTimeString() });
    renderHistory();
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function renderHistory() {
    const ul = $('history-list');
    if (history.length === 0) {
      ul.innerHTML = '<li><p class="empty-state">No queries yet.</p></li>';
      return;
    }
    ul.innerHTML = history.map(h => `
      <li>
        <div class="q">▸ ${esc(h.q)}</div>
        <div class="a">${esc(h.a)}</div>
        <div class="ts">${h.ts}</div>
      </li>
    `).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Auto-ping on load
  ping();
</script>
</body>
</html>
